<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ワンダと時の部屋</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <h1>ワンダと時の部屋</h1>
      <div class="diamonds">💎 <span id="diamondCount">0</span></div>
    </header>

    <main id="mainScreen" class="screen active">
      <section class="profile card float">
        <div id="avatar" class="avatar">🐾</div>
        <div>
          <div class="label">名前</div>
          <button id="nameBtn" class="nameBtn">なまえ未設定</button>
        </div>
      </section>

      <section class="shelf card">
        <h2>コレクション棚</h2>
        <div id="shelfGrid" class="grid9"></div>
      </section>

      <section class="menuGrid">
        <button class="menuBtn float" data-open="practice">練習カードデッキ</button>
        <button class="menuBtn float" data-open="mission">課題カードデッキ</button>
        <button class="menuBtn float" data-open="phone">スマホ</button>
        <button class="menuBtn float" data-open="file">クリアファイル</button>
        <button class="menuBtn float" data-open="gacha">コレクションガチャ</button>
      </section>
    </main>

    <main id="practiceScreen" class="screen">
      <div class="pageHead">
        <button class="backBtn">← 戻る</button>
        <h2>練習カード</h2>
      </div>
      <div id="practiceList" class="cardList"></div>
    </main>

    <main id="missionScreen" class="screen">
      <div class="pageHead">
        <button class="backBtn">← 戻る</button>
        <h2>課題カード</h2>
      </div>
      <div id="missionList" class="cardList"></div>
    </main>

    <main id="phoneScreen" class="screen">
      <div class="pageHead">
        <button class="backBtn">← 戻る</button>
        <h2>スマホ</h2>
      </div>
      <section class="card phoneBox">
        <p>名前：<b id="phoneName"></b></p>
        <p>現在のスコア：<b id="phoneScore"></b></p>
        <p>達成カード数：<b id="phoneClear"></b></p>
        <p>所持ガチャカード数：<b id="phoneCollection"></b></p>
        <p>所持ダイヤ：<b id="phoneDiamond"></b></p>
      </section>
    </main>

    <main id="fileScreen" class="screen">
      <div class="pageHead">
        <button class="backBtn">← 戻る</button>
        <h2>クリア済みファイル</h2>
      </div>
      <div id="fileGrid" class="grid9"></div>
      <div class="pager">
        <button id="prevPage">前へ</button>
        <span id="pageInfo">1 / 1</span>
        <button id="nextPage">次へ</button>
      </div>
    </main>

    <main id="gachaScreen" class="screen">
      <div class="pageHead">
        <button class="backBtn">← 戻る</button>
        <h2>コレクションガチャ</h2>
      </div>
      <section class="card gachaBox float">
        <p>1回 💎5</p>
        <button id="gachaBtn" class="bigBtn">ガチャを引く</button>
        <div id="gachaResult"></div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modalBox">
      <div id="modalText"></div>
      <div id="modalActions"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
